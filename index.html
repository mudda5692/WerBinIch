
<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Wer bin ich</title>

<style>
body{
font-family: Arial, sans-serif;
background:#121212;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
}

#controls{
margin:10px;
}

#menu {
  text-align: center;
  margin-bottom: 20px;
}

#setSelector {
  width: 200px;
  height: 40px;
  font-size: 16px;
}
  
button{
padding:10px 16px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
}

#game{
display:flex;
justify-content:center;
flex-wrap:wrap;
}

#grid{
display:grid;
grid-template-columns:repeat(auto-fill,110px);
gap:10px;
max-width:900px;
padding:20px;
}

.card{
background:#1e1e1e;
border-radius:10px;
padding:6px;
cursor:pointer;
transition:0.2s;
}

.card img{
width:100%;
border-radius:8px;
}

.card.disabled{
opacity:0.25;
}

.card.selected{
outline:3px solid orange;
}

#chosen{
width:220px;
padding:20px;
}

#chosen img{
width:100%;
border-radius:10px;
}
</style>
</head>

<body>

<h1>Wer bin ich? </h1>

<div id="menu">
  <select id="setSelector" onchange="changeSet()">
    <option value="overwatch">Overwatch</option>
    <option value="disney">Disney</option>
  </select>
</div>

<div id="controls">
<button onclick="resetGame()">Reset</button>
</div>

<div id="game">

<div id="grid"></div>

<div id="chosen">
<h3>Dein Charakter</h3>
<div id="chosenHero">Noch keiner gewählt</div>

</div>

let currentCharacters = heroes;

const grid = document.getElementById("grid");
const chosenHero = document.getElementById("chosenHero");
const info = document.getElementById("info");

let gameStarted=false;

function createGrid(){

grid.innerHTML="";

currentCharacters.forEach(hero=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${hero.img}" onerror="this.src='https://dummyimage.com/300x300/333/ffffff&text=${hero.name}'">
<div>${hero.name}</div>
`;

card.onclick=()=>{

if(!gameStarted){

document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
card.classList.add("selected");

chosenHero.innerHTML=`
<img src="${hero.img}">
<p>${hero.name}</p>
`;

info.textContent="Spiel gestartet – klicke Charaktere weg";

gameStarted=true;

}else{

card.classList.toggle("disabled");

}

};

grid.appendChild(card);

});

}

function resetGame(){

gameStarted=false;
chosenHero.innerHTML="Noch keiner gewählt";
info.textContent="Wähle zuerst einen Charakter.";
createGrid();

}



function changeSet(){

  const selected = document.getElementById("setSelector").value;

  if(selected === "overwatch"){
    currentCharacters = heroes;
  } else {
    currentCharacters = disneyCharacters;
  }

  createGrid();
}

createGrid();
