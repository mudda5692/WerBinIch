let currentCharacters = heroes;

const grid = document.getElementById("grid");
const chosenHero = document.getElementById("chosenHero");
const info = document.getElementById("info");

let gameStarted=false;

function createGrid(){

grid.innerHTML="";

currentCharacters.forEach(hero=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${hero.img}" onerror="this.src='https://dummyimage.com/300x300/333/ffffff&text=${hero.name}'">
<div>${hero.name}</div>
`;

card.onclick=()=>{

if(!gameStarted){

document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
card.classList.add("selected");

chosenHero.innerHTML=`
<img src="${hero.img}">
<p>${hero.name}</p>
`;

info.textContent="Spiel gestartet – klicke Charaktere weg";

gameStarted=true;

}else{

card.classList.toggle("disabled");

}

};

grid.appendChild(card);

});

}

function resetGame(){

gameStarted=false;
chosenHero.innerHTML="Noch keiner gewählt";
info.textContent="Wähle zuerst einen Charakter.";
createGrid();

}



function changeSet(){

  const selected = document.getElementById("setSelector").value;

 if(selected === "overwatch"){
   currentCharacters = heroes;
 }

 else if(selected === "disney"){
   currentCharacters = disneyCharacters;
 }

 else if(selected === "fiktional"){
   currentCharacters = fiktional;
 }

 createGrid();
}
