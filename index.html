        const CATEGORIES = {
            overwatch: OVERWATCH,
            disney: DISNEY,
            fiktional: FIKTIONAL,
            lol: LOL,
            actors: ACTORS
        };

        let currentCategory = 'overwatch';
        let selectedHero = null;
        let gameStarted = false;
        let disabledHeroes = new Set();

        function renderGrid() {
            const grid = document.getElementById('characterGrid');
            grid.innerHTML = '';
            
            const heroes = CATEGORIES[currentCategory];
            
            heroes.forEach(hero => {
                const card = document.createElement('div');
                const isDisabled = disabledHeroes.has(hero.name);
                const isSelected = selectedHero && selectedHero.name === hero.name;
                
                card.className = `bg-[#1e1e1e] p-2 rounded-xl cursor-pointer transition-all hover:scale-105 relative overflow-hidden group ${isDisabled ? 'card-disabled' : ''} ${isSelected ? 'card-selected' : ''}`;
                
                card.innerHTML = `
                    <div class="bg-black/20 rounded-lg mb-2 overflow-hidden">
                        <img src="${hero.img}" alt="${hero.name}" class="w-full aspect-square object-contain" onerror="this.src='https://dummyimage.com/300x300/333/ffffff&text=${hero.name}'">
                    </div>
                    <div class="text-center text-sm font-medium truncate px-1">${hero.name}</div>
                    ${isDisabled ? '<div class="absolute inset-0 flex items-center justify-center pointer-events-none"><div class="w-full h-1 bg-red-500/50 rotate-45 absolute"></div><div class="w-full h-1 bg-red-500/50 -rotate-45 absolute"></div></div>' : ''}
                `;
                
                card.onclick = () => handleCardClick(hero);
                grid.appendChild(card);
            });
        }

        function handleCardClick(hero) {
            if (!gameStarted) {
                selectedHero = hero;
                gameStarted = true;
                updateSidebar();
                renderGrid();
            } else {
                if (disabledHeroes.has(hero.name)) {
                    disabledHeroes.delete(hero.name);
                } else {
                    disabledHeroes.add(hero.name);
                }
                renderGrid();
            }
        }

        function updateSidebar() {
            const sidebar = document.getElementById('sidebarContent');
            if (selectedHero) {
                sidebar.innerHTML = `
                    <div class="bg-black/20 rounded-xl mb-4 overflow-hidden shadow-inner">
                        <img src="${selectedHero.img}" alt="${selectedHero.name}" class="w-full aspect-square object-contain" onerror="this.src='https://dummyimage.com/300x300/333/ffffff&text=${selectedHero.name}'">
                    </div>
                    <p class="text-2xl font-bold text-orange-500 mb-2">${selectedHero.name}</p>
                    <p class="text-sm text-gray-400 italic">Spiel gestartet – klicke Charaktere weg, die es nicht sind!</p>
                `;
            } else {
                sidebar.innerHTML = `
                    <div class="py-12 text-gray-500">
                        <p class="font-medium">Noch keiner gewählt</p>
                        <p class="text-xs mt-2">Wähle zuerst einen Charakter aus dem Raster.</p>
                    </div>
                `;
            }
        }

        function resetGame() {
            selectedHero = null;
            gameStarted = false;
            disabledHeroes.clear();
            updateSidebar();
            renderGrid();
        }

        function changeCategory() {
            currentCategory = document.getElementById('categorySelect').value;
            resetGame();
        }

        // Initial render
        renderGrid();
    </script>
