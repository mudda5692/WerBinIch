        .card-selected { outline: 3px solid #f97316; }
        .aspect-square { aspect-ratio: 1 / 1; }

    <header class="py-8 px-4 text-center">
        <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-6 bg-gradient-to-r from-orange-400 to-orange-600 bg-clip-text text-transparent">
            Wer bin ich?
        </h1>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-8">
            <div class="flex flex-col items-start gap-1">
                <label class="text-xs text-gray-500 font-semibold uppercase tracking-wider ml-1">Kategorie</label>
                <select id="categorySelect" onchange="changeCategory()" class="bg-[#1e1e1e] border border-white/10 rounded-xl px-4 py-2 text-lg focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all cursor-pointer w-full sm:w-64">
                    <option value="overwatch">Overwatch</option>
                    <option value="disney">Disney</option>
                    <option value="fiktional">Fiktional</option>
                    <option value="lol">League of Legends</option>
                    <option value="actors">Schauspieler</option>
                    <option value="film">Filme</option>
                </select>
            </div>

            <div class="flex flex-col items-start gap-1">
                <label class="text-xs text-gray-500 font-semibold uppercase tracking-wider ml-1">Spieler</label>
                <select id="playerCountSelect" onchange="changePlayerCount()" class="bg-[#1e1e1e] border border-white/10 rounded-xl px-4 py-2 text-lg focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all cursor-pointer w-full sm:w-32">
                    <option value="2">2 Spieler</option>
                    <option value="3">3 Spieler</option>
                    <option value="4">4 Spieler</option>
                </select>
            </div>

            <div class="flex flex-col items-start gap-1">
                <label class="text-xs invisible">Action</label>
                <button onclick="resetGame()" class="flex items-center gap-2 bg-orange-600 hover:bg-orange-500 text-white px-6 py-2 rounded-xl text-lg font-bold transition-all active:scale-95 shadow-lg shadow-orange-900/20 h-[46px]">
                    <span class="text-xl">↻</span> Reset
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 pb-20 flex flex-col lg:flex-row gap-8">
        <!-- Grid Section -->
        <div class="flex-1">
            <div id="characterGrid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-8 gap-4">
                <!-- Cards will be injected here -->
            </div>
        </div>

        <!-- Sidebar Section -->
        <aside class="lg:w-80 shrink-0">
            <div class="sticky top-8 bg-[#1e1e1e] border border-white/10 rounded-2xl p-6 shadow-2xl">
                <h3 class="text-xl font-bold mb-4 flex items-center gap-2 border-b border-white/5 pb-4">
                    <span class="text-orange-500">👤</span> Dein Charakter
                </h3>
                
                <div id="sidebarContent" class="text-center">
                    <div class="py-12 text-gray-500">

                        <p class="text-xs mt-2">Wähle zuerst einen Charakter aus dem Raster.</p>

                </div>
            </div>
        </aside>

            {name: "Guardians of the Galaxy", img: ""},
            {name: "Toy Story", img: ""},
            {name: "Nemo", img: ""},
            {name: "Shrek", img: ""},
            {name: "Kung Fu Panda", img: ""},
            {name: "Alles steht Kopf", img: ""},
            {name: "Oben", img: ""},
            {name: "Cars", img: ""},
            {name: "Harry Potter", img: ""},
            {name: "Herr der Ringe", img: ""},
            {name: "Star Wars", img: ""},
            {name: "Doctor Strange", img: ""},
            {name: "Dune", img: ""},
            {name: "Jaws", img: ""},
            {name: "Zurück in die Zukunft", img: ""},
            {name: "Forrest Gump", img: ""},
            {name: "Hunger Games", img: ""},
            {name: "Zoomania", img: ""},
            {name: "Ratatouille", img: ""},
            {name: "Wall-E", img: ""},
            {name: "Wandelnde Schloss", img: ""},
        ];

        const CATEGORIES = {
            overwatch: OVERWATCH,
            disney: DISNEY,
            fiktional: FIKTIONAL,
            lol: LOL,
            actors: ACTORS,
            film: FILM
        };

        let currentCategory = 'overwatch';
        let playerCount = 2;
        let selectedHeroes = [];
        let gameStarted = false;
        let disabledHeroes = new Set();

        function renderGrid() {
            const grid = document.getElementById('characterGrid');
            grid.innerHTML = '';
            
            const heroes = CATEGORIES[currentCategory];
            
            heroes.forEach(hero => {
                const card = document.createElement('div');
                const isDisabled = disabledHeroes.has(hero.name);
                const isSelected = selectedHeroes.some(h => h.name === hero.name);
                
                card.className = `bg-[#1e1e1e] p-3 rounded-2xl cursor-pointer transition-all hover:scale-105 relative overflow-hidden group shadow-lg ${isDisabled ? 'card-disabled' : ''} ${isSelected ? 'card-selected' : ''}`;
                
                card.innerHTML = `
                    <div class="bg-black/20 rounded-xl mb-3 overflow-hidden">
                        <img src="${hero.img}" alt="${hero.name}" class="w-full aspect-square object-contain" onerror="this.src='https://dummyimage.com/300x300/333/ffffff&text=${hero.name}'">
                    </div>
                    <div class="text-center text-[10px] font-bold truncate px-1">${hero.name}</div>
                    ${isDisabled ? '<div class="absolute inset-0 flex items-center justify-center pointer-events-none"><div class="w-full h-1.5 bg-red-500/60 rotate-45 absolute"></div><div class="w-full h-1.5 bg-red-500/60 -rotate-45 absolute"></div></div>' : ''}
                `;
                
                card.onclick = () => handleCardClick(hero);
                grid.appendChild(card);
            });
        }

        function handleCardClick(hero) {
            const maxSelections = playerCount - 1;
            
            if (!gameStarted) {
                // Check if already selected
                const index = selectedHeroes.findIndex(h => h.name === hero.name);
                if (index > -1) {
                    selectedHeroes.splice(index, 1);
                } else if (selectedHeroes.length < maxSelections) {
                    selectedHeroes.push(hero);
                }
                
                if (selectedHeroes.length === maxSelections) {
                    gameStarted = true;
                }
                
                updateSidebar();
                renderGrid();
            } else {
                if (disabledHeroes.has(hero.name)) {
                    disabledHeroes.delete(hero.name);
                } else {
                    disabledHeroes.add(hero.name);
                }
                renderGrid();
            }
        }

        function updateSidebar() {
            const sidebar = document.getElementById('sidebarContent');
            const maxSelections = playerCount - 1;
            
            if (selectedHeroes.length > 0) {
                let html = '<div class="flex flex-col gap-4">';
                
                selectedHeroes.forEach((hero, idx) => {
                    html += `
                        <div class="bg-black/10 p-4 rounded-2xl border border-white/5">
                            <p class="text-xs text-gray-500 uppercase font-bold mb-2">Charakter ${idx + 1}</p>
                            <div class="bg-black/20 rounded-xl mb-3 overflow-hidden shadow-inner max-w-[120px] mx-auto">
                                <img src="${hero.img}" alt="${hero.name}" class="w-full aspect-square object-contain" onerror="this.src='https://dummyimage.com/300x300/333/ffffff&text=${hero.name}'">
                            </div>
                            <p class="text-xl font-black text-orange-500">${hero.name}</p>
                        </div>
                    `;
                });
                
                if (!gameStarted) {
                    html += `
                        <div class="mt-4 p-4 bg-orange-500/10 rounded-xl border border-orange-500/20">
                            <p class="text-sm text-orange-400 font-medium">Wähle noch ${maxSelections - selectedHeroes.length} Charakter(e)</p>
                        </div>
                    `;
                } else {
                    html += `
                        <p class="text-sm text-gray-400 italic mt-4">Spiel gestartet – klicke Charaktere weg, die es nicht sind!</p>
                    `;
                }
                
                html += '</div>';
                sidebar.innerHTML = html;
            } else {
                sidebar.innerHTML = `
                    <div class="py-12 text-gray-500">
                        <p class="text-lg font-semibold">Noch keiner gewählt</p>
                        <p class="text-sm mt-2">Wähle zuerst ${maxSelections} Charakter(e) aus dem Raster.</p>
                    </div>
                `;
            }
        }

        function resetGame() {
            selectedHeroes = [];
            gameStarted = false;
            disabledHeroes.clear();
            updateSidebar();
            renderGrid();
        }

        function changeCategory() {
            currentCategory = document.getElementById('categorySelect').value;
            resetGame();
        }

        function changePlayerCount() {
            playerCount = parseInt(document.getElementById('playerCountSelect').value);
            resetGame();
        }

        // Initial render
        renderGrid();
    </script>
